<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hayırlı Bayramlar</title>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Cormorant+Garamond:ital,wght@0,500;1,600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --gold: #C0A062;
            --gold-light: #FFDF70;
            --green-dark: #061910;
            --green-light: #15452d;
            --parchment: #F5EAD9;
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--green-dark);
            background-image: radial-gradient(circle at 50% 20%, var(--green-light) 0%, var(--green-dark) 90%);
            display: flex; justify-content: center; align-items: center;
            font-family: 'Cormorant Garamond', serif;
            overflow: hidden;
            color: #fff;
        }

        /* --- ARKA PLAN MANZARASI --- */

        /* Parıldayan Yıldızlı Gökyüzü */
        #sky {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            pointer-events: none; z-index: 0;
        }
        .star {
            position: absolute;
            background: #fff;
            border-radius: 50%;
            animation: twinkle 4s infinite ease-in-out;
        }
        @keyframes twinkle {
            0%, 100% { box-shadow: 0 0 5px 1px rgba(255, 255, 255, 0.4); opacity: 0.7; }
            50% { box-shadow: 0 0 10px 3px rgba(255, 255, 255, 1); opacity: 1; }
        }

        /* Sarkan Kandiller */
        .lantern-container { position: absolute; top: 0; transform-origin: top center; z-index: 2; animation: swing 4.5s ease-in-out infinite; }
        .lc-1 { right: 8%; width: 55px; height: 160px; }
        .lc-2 { left: 8%; animation-duration: 3.5s; width: 45px; height: 130px; }
        .hanging-chain { position: absolute; top: 0; left: 50%; transform: translateX(-50%); width: 2px; height: 40px; background: repeating-linear-gradient(to bottom, var(--gold) 0, var(--gold) 4px, transparent 4px, transparent 8px); }
        .lantern-svg { position: absolute; top: 40px; left: 0; width: 100%; filter: drop-shadow(0 5px 20px rgba(192,160,98,0.7)); }
        @keyframes swing { 0% { transform: rotate(-4deg); } 50% { transform: rotate(4deg); } 100% { transform: rotate(-4deg); } }

        /* Arkadan Aydınlatmalı Cami Silüeti */
        .mosque-silhouette {
            position: absolute;
            bottom: -5px; /* Taşmayı engelle */
            left: 0;
            width: 100%;
            height: 25vh; /* Ekranın alt çeyreğini kaplasın */
            z-index: 1;
            pointer-events: none;
            background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" preserveAspectRatio="none"><path d="M0,120 L0,80 C150,80 150,40 300,40 C450,40 450,80 600,80 C600,80 600,20 650,20 C700,20 700,80 750,80 C850,80 850,50 1000,50 C1150,50 1150,80 1200,80 L1200,120 Z" fill="%2304120C"/></svg>') bottom center no-repeat;
            background-size: cover;
            filter: drop-shadow(0 -10px 30px rgba(192,160,98, 0.4));
            opacity: 0.9;
        }


        /* Uçuşan Altın Tozları */
        .particles-container { position: absolute; width: 100%; height: 100%; top: 0; left: 0; pointer-events: none; z-index: 2; }
        .particle { position: absolute; bottom: -10px; width: 4px; height: 4px; background: var(--gold-light); border-radius: 50%; box-shadow: 0 0 8px 1px var(--gold-light); animation: floatUp linear infinite; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 0; } 20% { opacity: 1; } 100% { transform: translateY(-100vh); opacity: 0; } }

        /* --- ZARF VE PARŞÖMEN --- */
        #interactive-area { position: relative; z-index: 10; display: flex; justify-content: center; align-items: center; }

        .envelope-wrapper { position: relative; width: 340px; height: 230px; cursor: pointer; transition: all 0.5s ease; filter: drop-shadow(0 40px 50px rgba(0,0,0,0.9)); }
        .envelope-wrapper:hover { transform: translateY(-12px) scale(1.03); filter: drop-shadow(0 50px 60px rgba(0,0,0,1));}
        .envelope-back { position: absolute; width: 100%; height: 100%; background: linear-gradient(135deg, var(--green-light) 0%, #103322 100%); border-radius: 5px; border: 2px solid var(--gold); }
        .envelope-front { position: absolute; bottom: 0; left: 0; border-left: 170px solid transparent; border-right: 170px solid transparent; border-bottom: 125px solid #0f3020; z-index: 3; }
        .envelope-flap { position: absolute; top: 0; left: 0; border-left: 170px solid transparent; border-right: 170px solid transparent; border-top: 135px solid #14402a; z-index: 4; }

        .wax-seal {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 65px; height: 65px; background: radial-gradient(circle, #8A0303 0%, #540101 100%);
            border-radius: 50%; z-index: 5;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8), 0 5px 15px rgba(0,0,0,0.6);
            border: 3px solid #b31414;
            display: flex; justify-content: center; align-items: center;
        }
        .wax-seal::after {
            content: ''; position: absolute; width: 35px; height: 35px;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="%23C0A062"><path d="M12.2,2.3C7,2.3,2.8,6.5,2.8,11.7s4.3,9.4,9.4,9.4c2.5,0,4.8-1,6.5-2.6c-2.3-1.7-3.8-4.4-3.8-7.3s1.5-5.6,3.8-7.3 C17.1,2.9,14.7,2.3,12.2,2.3z"/></svg>');
            background-size: contain; background-repeat: no-repeat; opacity: 0.9;
        }
        .click-text { position: absolute; bottom: -70px; width: 100%; text-align: center; font-family: 'Cinzel', serif; color: var(--gold-light); font-size: 19px; letter-spacing: 2px; text-shadow: 0 0 15px rgba(255, 215, 0, 0.9); animation: pulseText 2s infinite alternate; z-index: 5; }
        @keyframes pulseText { from { opacity: 0.6; } to { opacity: 1; } }

        /* RULO PARŞÖMEN Mektup */
        .inner-letter {
            display: none; background: var(--parchment); width: 92vw; max-width: 520px;
            padding: 70px 35px; position: absolute; z-index: 100; box-sizing: border-box; text-align: center; color: #153823;
            box-shadow: 0 30px 80px rgba(0,0,0,1);
            background-image: url("https://www.transparenttextures.com/patterns/old-paper.png");
        }
        .inner-letter::before, .inner-letter::after { content: ''; position: absolute; width: 102%; left: -1%; height: 50px; background: linear-gradient(to bottom, #d8c8a8, #F5EAD9, #d8c8a8); box-shadow: 0 5px 15px rgba(0,0,0,0.4); border-radius: 30px / 8px; z-index: -1; }
        .inner-letter::before { top: -25px; }
        .inner-letter::after { bottom: -25px; }

        .decorative-icon { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); width: 50px; height: auto; opacity: 0.8; }
        .inner-letter h1 { font-family: 'Cinzel', serif; font-size: 32px; margin-top: 15px; margin-bottom: 25px; background: linear-gradient(to right, #9e7f1f, #e4cd64, #9e7f1f); -webkit-background-clip: text; color: transparent; text-shadow: 2px 2px 4px rgba(0,0,0,0.05); position: relative; }
        .inner-letter h1::after { content: ""; display: block; width: 60%; height: 2px; background: linear-gradient(90deg, transparent, var(--gold), transparent); margin: 15px auto 0 auto; }
        .inner-letter p { font-family: 'Playfair Display', serif; font-size: 20px; line-height: 1.8; margin: 10px 10px; font-weight: 500; color: #1a1a1a; letter-spacing: 0.5px; }
        .inner-letter .signature { font-style: italic; color: var(--gold-dark); font-size: 26px; margin-top: 35px; font-weight: 700; border-top: 1px dotted var(--gold); display: inline-block; padding-top: 15px; padding-left: 20px; padding-right: 20px; }

        @keyframes pullOut { 0% { opacity: 0; transform: translateY(60px) scale(0.85); } 100% { opacity: 1; transform: translateY(0) scale(1); } }
    </style>
</head>
<body>
    <div id="sky"></div>
    
    <div class="lantern-container lc-1">
        <div class="hanging-chain"></div>
        <svg class="lantern-svg" viewBox="0 0 64 64" fill="#C0A062"><path d="M32 0l-5 8h10zM15 15c0 10 7 13 7 25h20c0-12 7-15 7-25h-34zM24 15h16M24 40h16M18 42l4 8h20l4-8zM25 50h14v10l-7 4-7-4zM22 20h20v16h-20z" opacity="0.9"/></svg>
    </div>
    <div class="lantern-container lc-2">
        <div class="hanging-chain" style="height:25px;"></div>
        <svg class="lantern-svg" style="top:25px;" viewBox="0 0 64 64" fill="#C0A062"><path d="M32 0l-5 8h10zM15 15c0 10 7 13 7 25h20c0-12 7-15 7-25h-34zM24 15h16M24 40h16M18 42l4 8h20l4-8zM25 50h14v10l-7 4-7-4zM22 20h20v16h-20z" opacity="0.8"/></svg>
    </div>

    <div class="particles-container" id="particles"></div>
    <div class="mosque-silhouette"></div>

    <div id="interactive-area">
        <div class="envelope-wrapper" id="myEnvelope" onclick="openEnvelope()">
            <div class="envelope-back"></div>
            <div class="envelope-front"></div>
            <div class="envelope-flap"></div>
            <div class="wax-seal"></div>
            <div class="click-text">Sana Özel Bir Mesaj<br><span style="font-size: 14px; font-family: 'Cormorant Garamond', serif;">(Mührü Açmak İçin Tıklayın)</span></div>
        </div>
        <div class="inner-letter" id="myLetter">
            <svg class="decorative-icon" viewBox="0 0 100 50" fill="#AA8C2C"><path d="M50 0 C45 20, 30 30, 0 30 C30 40, 45 45, 50 50 C55 45, 70 40, 100 30 C70 30, 55 20, 50 0 Z"/></svg>
            <h1>Hayırlı Bayramlar</h1>
            <p>
                Ramazan Bayramın mübarek olsun.
                <br><br>
                Tıpkı etrafa saçılan bu şekerler gibi bol tatlılı, bol gülücüklü ve enerjisi hiç düşmeyen bir bayram geçirmen dileğiyle. İyi bayramlar...🍫✨
            </p>
            <div class="signature">Ahmet Gündoğan</div>
        </div>
    </div>

    <script>
        // Rastgele yıldızlar oluşturma
        const sky = document.getElementById('sky');
        const numStars = 80;
        for (let i = 0; i < numStars; i++) {
            let star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 2 + 1; // 1-3px arası
            star.style.width = `${size}px`;
            star.style.height = `${size}px`;
            star.style.top = `${Math.random() * 100}%`;
            star.style.left = `${Math.random() * 100}%`;
            star.style.animationDelay = `${Math.random() * 4}s`;
            sky.appendChild(star);
        }

        const pContainer = document.getElementById('particles');
        for(let i=0; i<20; i++) {
            let particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + 'vw';
            particle.style.animationDuration = (Math.random() * 8 + 6) + 's';
            particle.style.animationDelay = (Math.random() * 8) + 's';
            pContainer.appendChild(particle);
        }

        let isOpened = false;
        function openEnvelope() {
            if (isOpened) return;
            isOpened = true;
            const envelope = document.getElementById('myEnvelope');
            const letter = document.getElementById('myLetter');
            envelope.style.transition = 'all 0.5s ease-out';
            envelope.style.opacity = '0';
            envelope.style.transform = 'scale(0.8) translateY(200px)';
            envelope.style.pointerEvents = 'none';

            setTimeout(() => {
                envelope.style.display = 'none';
                letter.style.display = 'block';
                letter.style.animation = 'pullOut 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards';

                const duration = 3 * 1000;
                const end = Date.now() + duration;
                const candyEmojis = ['🍬', '🍭', '🍫', '✨'];

                (function frame() {
                    confetti({
                        particleCount: 3, angle: 60, spread: 55, origin: { x: 0 },
                        shapes: ['text'], text: candyEmojis, scalar: 1.5
                    });
                    confetti({
                        particleCount: 3, angle: 120, spread: 55, origin: { x: 1 },
                        shapes: ['text'], text: candyEmojis, scalar: 1.5
                    });
                    if (Date.now() < end) {
                        requestAnimationFrame(frame);
                    }
                }());

            }, 500);
        }
    </script>
</body>
</html>
